name: Update repo.json

on:
  repository_dispatch:
    types: [plugin-released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild repo.json
        shell: pwsh
        run: |
          $plugins = Get-Content "plugins.json" | ConvertFrom-Json
          $result  = [System.Collections.Generic.List[object]]::new()

          foreach ($plugin in $plugins) {
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$($plugin.repo)/releases/latest" `
              -Headers @{
                "Accept"     = "application/vnd.github+json"
                "User-Agent" = "DalamudPlugins-CI"
              }

            $version     = $release.tag_name -replace '^v', ''
            $timestamp   = [int][DateTimeOffset]::Parse($release.published_at).ToUnixTimeSeconds()
            $downloadUrl = "https://github.com/$($plugin.repo)/releases/latest/download/latest.zip"

            $result.Add([ordered]@{
              Author              = $plugin.author
              Name                = $plugin.name
              Punchline           = $plugin.punchline
              Description         = $plugin.description
              Changelog           = ""
              Tags                = $plugin.tags
              CategoryTags        = @()
              RepoUrl             = "https://github.com/$($plugin.repo)"
              ApplicableVersion   = "any"
              DalamudApiLevel     = $plugin.dalamudApiLevel
              IconUrl             = $plugin.iconUrl
              ImageUrls           = $plugin.imageUrls
              AssemblyVersion     = $version
              IsHide              = $false
              IsTestingExclusive  = $false
              LastUpdate          = $timestamp
              DownloadLinkInstall = $downloadUrl
              DownloadLinkTesting = $downloadUrl
              DownloadLinkUpdate  = $downloadUrl
            })
          }

          ConvertTo-Json -InputObject @($result) -Depth 5 | Set-Content "repo.json"

      - name: Commit and push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          if ((git diff --staged --name-only) -contains "repo.json") {
            git commit -m "ci: update repo.json [skip ci]"
            git push
          }
